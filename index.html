<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XenoTools</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#06080f;--card:#0e1420;--border:rgba(255,255,255,0.07);--text:#b8cce0;--muted:#4a5a72;--white:#e8f0fc;--a:#e85d3a}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:9999}
#hdr{padding:22px 28px 0;display:flex;align-items:center;gap:14px}
.logo{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;letter-spacing:.07em;color:var(--white)}
.logo b{color:var(--a)}
.logo-sub{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--muted);margin-top:3px}
#tabs{display:flex;padding:16px 28px 0;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);gap:2px}
#tabs::-webkit-scrollbar{display:none}
.t{flex-shrink:0;padding:9px 16px;font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s;position:relative;top:1px}
.t:hover{color:var(--white)}
.t.on{color:var(--white);border-bottom-color:var(--a)}
.tdot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--a);margin-right:6px;vertical-align:middle}
#main{padding:22px 28px 80px;max-width:1120px}
.gi{margin-bottom:22px}
.gn{font-family:'Orbitron',monospace;font-size:clamp(15px,2.2vw,22px);font-weight:700;color:var(--white);margin-bottom:3px}
.gt{font-size:12px;color:var(--muted);letter-spacing:.05em}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px}
.tc{background:var(--card);border:1px solid var(--border);transition:border-color .2s}
.tc:hover{border-color:rgba(255,255,255,.15)}
.tc.open{border-color:var(--a)}
.th{display:flex;align-items:center;gap:11px;padding:15px 17px;cursor:pointer;user-select:none}
.ti{font-size:19px;flex-shrink:0}
.tm{flex:1;min-width:0}
.tn{font-size:13px;font-weight:600;color:var(--white);letter-spacing:.04em}
.tb{font-size:11px;color:var(--muted);margin-top:2px}
.tch{font-size:9px;color:var(--muted);transition:transform .2s;flex-shrink:0}
.tc.open .tch{transform:rotate(180deg)}
.bd{display:none;border-top:1px solid var(--border);padding:18px 17px;background:rgba(0,0,0,.22)}
.tc.open .bd{display:block}
/* form */
.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.col{flex:1;min-width:110px}
label{display:block;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
input,select{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--white);padding:8px 10px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none}
input:focus,select:focus{border-color:var(--a)}
select option{background:#0c1018}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 20px;background:transparent;border:1px solid var(--a);color:var(--a);font-family:'Exo 2',sans-serif;font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;margin-top:2px}
.btn:hover{background:var(--a);color:#000}
.btn2{border-color:var(--muted);color:var(--muted);margin-left:8px}
.btn2:hover{background:var(--muted);color:#000}
/* output */
.out{background:rgba(0,0,0,.4);border:1px solid var(--border);padding:13px 15px;margin-top:12px;font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.9}
.out.h{display:none}
.op{font-size:19px;font-weight:700;color:var(--a);margin-bottom:3px}
.os{color:var(--muted);font-size:11px}
.ol{display:flex;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.04);padding:3px 0}
.ol:last-child{border:none}
.ok{color:var(--muted)}
.ov{color:var(--white)}
.oh{color:var(--a)}
hr.d{border:none;border-top:1px solid var(--border);margin:11px 0}
/* checklist */
.cl{list-style:none}
.cl li{display:flex;align-items:flex-start;gap:9px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:12px;cursor:pointer;user-select:none}
.cl li:last-child{border:none}
.cb{width:15px;height:15px;border:1px solid var(--muted);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .15s;margin-top:1px}
.cl li.done .cb{background:var(--a);border-color:var(--a);color:#000}
.cl li.done .cl-label{text-decoration:line-through;color:var(--muted)}
.cl-label{flex:1}
.miss{font-size:9px;color:#e85d3a;letter-spacing:.08em;flex-shrink:0;text-align:right;padding-top:2px}
/* chips */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.chip{background:rgba(255,255,255,.04);border:1px solid var(--border);padding:7px 11px;flex:1;min-width:80px}
.chip-k{font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-bottom:2px}
.chip-v{font-size:15px;font-family:'Share Tech Mono',monospace;color:var(--a)}
/* misc */
.sec{font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--a);margin:14px 0 9px;padding-bottom:3px;border-bottom:1px solid rgba(255,255,255,.05)}
.sec:first-child{margin-top:0}
.split{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tag{display:inline-block;border:1px solid var(--a);color:var(--a);font-size:9px;letter-spacing:.08em;padding:1px 5px;vertical-align:middle}
.warn{font-size:11px;color:#e85d3a;background:rgba(232,93,58,.08);border:1px solid rgba(232,93,58,.25);padding:8px 10px;margin-top:10px}
.note{font-size:11px;color:var(--muted);background:rgba(255,255,255,.03);border:1px solid var(--border);padding:8px 10px;margin-top:10px}
.bar-w{background:rgba(255,255,255,.05);height:5px;margin-top:5px;flex:1}
.bar-f{height:100%;background:var(--a);transition:width .4s}
table.dt{width:100%;border-collapse:collapse;font-size:11px;font-family:'Share Tech Mono',monospace}
table.dt th{font-family:'Exo 2',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--a);text-align:left;padding:6px 7px;border-bottom:1px solid var(--border)}
table.dt td{padding:6px 7px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text)}
table.dt tr:hover td{background:rgba(255,255,255,.02)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--muted)}
@media(max-width:520px){.split{grid-template-columns:1fr}.tg{grid-template-columns:1fr}}
</style>
</head>

// ═══════════════════════════════════════════════
// CALC FUNCTIONS
// ═══════════════════════════════════════════════
const G=id=>document.getElementById(id);
const GV=id=>G(id)?G(id).value:'0';
const GN=id=>parseFloat(GV(id))||0;
const GI=id=>parseInt(GV(id))||0;
const SH=id=>{const e=G(id);if(e)e.classList.remove('h');}
const ST=(id,v,c)=>{const e=G(id);if(!e)return;e.textContent=v;if(c)e.style.color=c;};

// XC1
function gemCalc(){
  const tier=GN('g_tier'),ct=GI('g_ct'),str=GI('g_str'),diff=GN('g_diff');
  const syn=ct>=5?1.3:ct===4?1.15:ct===3?1.0:0.85;
  const raw=Math.floor((tier*20+str*12)*syn/diff);
  const oc=Math.min(90,ct*4+str*6);
  const g4=Math.min(95,Math.floor(raw*0.8));
  const grade=raw>=90?'Grade V (Max)':raw>=70?'Grade IV':raw>=50?'Grade III':raw>=30?'Grade II':'Grade I';
  ST('gem_grade',grade);
  ST('gem_detail','Tier '+['','Silver','Gold','Platinum'][tier]+', '+ct+'× cylinders, Strength '+str);
  ST('gem_score',raw+'/100');ST('gem_oc',oc+'%');ST('gem_g4',g4+'%');
  ST('gem_tip',ct<5?'Use 5 cylinders for +30% synergy':str<5?'Higher crafter Strength improves grade':'Optimal!');
  SH('gem_out');
}
function expCalc(){
  const cur=GI('e_cur'),tgt=GI('e_tgt'),elv=GI('e_elv'),base=GI('e_exp'),boost=GI('e_boost'),cexp=GI('e_cur_exp');
  if(tgt<=cur){ST('exp_kills','Already at target!');SH('exp_out');return;}
  let need=0;for(let l=cur;l<tgt;l++)need+=Math.floor(l*l*17+l*80+200);need-=cexp;
  const gap=cur-elv;
  const pen=gap>=10?75:gap>=5?50:gap>=1?10:0;
  const eff=Math.max(1,Math.floor(base*(1+boost/100)*(1-pen/100)));
  const kills=Math.ceil(need/eff);
  ST('exp_kills',kills.toLocaleString()+' kills');
  ST('exp_sub','Lv '+cur+' → Lv '+tgt+' · '+need.toLocaleString()+' EXP needed');
  ST('exp_total',need.toLocaleString());ST('exp_eff',eff+' EXP');
  ST('exp_pen',pen>0?'-'+pen+'% (enemy too low)':'None');
  ST('exp_rec','Lv '+(cur+2)+'–'+(cur+6)+' enemies');SH('exp_out');
}
function acCalc(){
  const am=GI('ac_am'),a5=GI('ac_a5'),sk=GI('ac_sk'),br=GI('ac_br');
  const amv=am*53,a5v=a5*11,skv=sk*3+br*10,total=amv+a5v+skv;
  ST('ac_total',total.toLocaleString()+' coins');
  ST('ac_am_v',amv.toLocaleString());ST('ac_a5_v',a5v.toLocaleString());ST('ac_sk_v',skv.toLocaleString());
  ST('ac_q','~'+Math.ceil(total/4)+' quests');SH('ac_out');
}
function artCDCalc(){
  const haste=GI('a_haste'),agi=GN('a_agi');
  const hasteRed=[0,0.05,0.10,0.15,0.20,0.25];
  const red=hasteRed[Math.min(5,haste)];
  [1,2,3,4].forEach(i=>{
    const base=GI('a'+i);
    const eff=Math.round(base*(1-red)*agi*10)/10;
    ST('a'+i+'r',eff+'s (was '+base+'s)');
  });
  ST('a_hred','-'+(red*100).toFixed(0)+'% cooldown');
  ST('a_hrec',haste<5?'Grade '+(haste+1)+' Haste next':'Max Haste equipped');
  SH('art_out');
}
function c6Calc(){
  const h=GI('c6h'),n=GI('c6n'),c=GI('c6c'),f=GI('c6f'),l=GI('c6l');
  const done=h+n+c+f+l,total=25,pct=Math.round(done/total*100);
  ST('c6_pct',pct+'% complete');
  ST('c6_rem',(total-done)+' levels remaining');
  ST('c6_mat','~'+((total-done)*80)+' materials approx');
  ST('c6_done',done===total?'✓ Fully rebuilt!':'Not yet — '+done+'/'+total+' levels done');
  SH('c6_out');
}
function umCalc(){
  const party=GI('um_party'),boss=GI('um_boss'),topple=GI('um_topple'),gems=GI('um_gems');
  const gap=boss-party;
  const hitPen=gap>10?50:gap>5?25:gap>0?10:0;
  const risk=gap<=-5?'Low — overleveled':gap<=0?'Moderate — should be fine':gap<=5?'High — prepare well':gap<=10?'Very High — grind more':'Avoid — too low level';
  const rec=Math.max(1,boss-3);
  const sub=(topple?'Topple lock helps. ':'No Topple lock — risky. ')+(gems?'Gems slotted — good.':'Slot your gems first!');
  ST('um_risk',risk);ST('um_sub',sub);
  ST('um_gap',(gap>0?'+':'')+gap+' levels');
  ST('um_hit',hitPen>0?'-'+hitPen+'% to hit':'None');
  ST('um_rec','Lv '+rec+' minimum recommended');SH('um_out');
}
function xc1QC(){
  const d=document.querySelectorAll('#xc1_ql li.done').length;
  ST('xc1_qd',d);ST('xc1_ql2',12-d);
}

// XCX
function probeCalc(){
  const m1=GI('p_m1'),m2=GI('p_m2'),r1=GI('p_r1'),r2=GI('p_r2');
  const b=GI('p_b'),d=GI('p_d'),s=GI('p_s'),site=GN('p_site');
  const bm=1+b*0.1;const mir=Math.round((m1*50+m2*100+d*100)*site*bm);
  const cr=Math.round((r1*1000+r2*2000)*site*bm);
  const cap=6000+s*2000;const tot=m1+m2+r1+r2+b+d+s;
  ST('p_mir',mir.toLocaleString());ST('p_cr',cr.toLocaleString());
  ST('p_bm','×'+bm.toFixed(2));ST('p_cap',cap.toLocaleString());
  ST('p_fill',mir>0?Math.round(cap/mir*60)+'min':'∞');ST('p_tot',tot+' / 127');SH('probe_out');
}
function skellCalc(){
  const frame=GI('sk_f'),gear=GI('sk_gear'),ins=GI('sk_ins');
  const total=frame+gear,repair=Math.floor(total*0.3),icost=Math.floor(frame*0.05);
  const save=repair-icost;
  ST('sk_verdict',ins>2?'Well insured — fight freely':'Low insurance — be careful');
  ST('sk_sub',ins+' use'+(ins!==1?'s':'')+' remaining');
  ST('sk_tot',total.toLocaleString()+' cr');ST('sk_rep',repair.toLocaleString()+' cr');
  ST('sk_ic',icost.toLocaleString()+' cr');ST('sk_sav',save.toLocaleString()+' cr');
  ST('sk_rec',ins===0?'Buy insurance NOW':ins<=1?'Restock soon':save>50000?'Highly cost-effective to insure':'Stay insured');SH('skell_out');
}
function bpCalc(){
  const cur=GI('br_c'),tgt=GI('br_t'),bp=GI('br_bp'),m=GI('br_m'),co=GI('br_co'),div=GI('br_div');
  if(tgt<=cur){ST('bp_need','Already there!');SH('bp_out');return;}
  const thresh=[0,500,1500,3500,7000,12000,20000,32000,50000,75000];
  const need=thresh[tgt-1]-bp;
  if(need<=0){ST('bp_need','Already enough BP!');SH('bp_out');return;}
  const eff=Math.floor(m*(1+div/100));
  ST('bp_need',need.toLocaleString()+' BP needed');
  ST('bp_sub','Rank '+cur+' → Rank '+tgt);
  ST('bp_mis',Math.ceil(need/eff).toLocaleString());
  ST('bp_csess',Math.ceil(need/co).toLocaleString()+' sessions');
  ST('bp_eff',eff+' BP');SH('bp_out');
}
function odCalc(){
  const base=GI('od_b'),stacks=GI('od_s'),tens=GN('od_t'),boost=GI('od_boost'),soul=GN('od_soul'),arts=GI('od_arts');
  const sm=1+stacks*0.05;const mult=sm*tens*soul*(1+boost/100);
  const dmg=Math.floor(base*mult);
  ST('od_dmg',dmg.toLocaleString()+' dmg');
  ST('od_sm','×'+sm.toFixed(2)+' ('+stacks+' stacks)');
  ST('od_tm','×'+tens+' tension');
  ST('od_ch',(dmg*arts).toLocaleString()+' total ('+arts+' arts)');SH('od_out');
}
function segCalc(){
  const dat=[['Primordia',GI('seg_pri'),61],['Noctilum',GI('seg_noc'),47],['Oblivia',GI('seg_obl'),53],['Sylvalum',GI('seg_syl'),42],['Cauldros',GI('seg_cau'),51]];
  let totF=0,totM=254;dat.forEach(r=>totF+=r[1]);
  ST('seg_total',Math.round(totF/totM*100)+'% ('+totF+'/'+totM+')');
  G('seg_rows').innerHTML=dat.map(r=>{
    const pct=Math.round(r[1]/r[2]*100);
    return `<div class="ol"><span class="ok">${r[0]}</span><span class="ov">${r[1]}/${r[2]} (${pct}%) <span style="display:inline-block;width:${pct*0.8}px;height:4px;background:var(--a);vertical-align:middle"></span></span></div>`;
  }).join('');SH('seg_out');
}
function classCalc(){
  const max=GI('cl_name'),lp=GI('cl_lp'),rate=GI('cl_rate');
  const need=Math.max(0,max-lp);const battles=Math.ceil(need/rate);
  const time=Math.round(battles*1.5);
  ST('cl_battles',battles.toLocaleString()+' battles');
  ST('cl_sub','To master current class');
  ST('cl_need',need.toLocaleString()+' LP');
  ST('cl_time','~'+time+' minutes');SH('cl_out');
}

// XC2
function trustCalc(){
  const rank=GI('tr_r'),pct=GI('tr_pct'),p=GI('tr_p'),m=GI('tr_m'),type=GN('tr_t'),battles=GI('tr_b');
  const thresh=[500,1500,4000,10000];
  let need=0;for(let i=rank;i<thresh.length;i++)need+=thresh[i];
  need-=Math.floor(thresh[rank]*pct/100);
  const eff=Math.floor(10*type*(1+(p+m)/100));
  const total=Math.ceil(need/eff);
  ST('tr_res',total.toLocaleString()+' battles to max');
  ST('tr_sub','Rank '+(rank+1)+' → Max · '+need.toLocaleString()+' trust needed');
  ST('tr_need',need.toLocaleString());ST('tr_eff',eff+' trust');
  ST('tr_sess',Math.ceil(total/battles)+' sessions of '+battles);
  ST('tr_tip',p<30?'Use favourite pouch items — up to 300% trust bonus':'Pouch optimized!');SH('trust_out');
}
function pityCalc(){
  const base=GN('pit_t'),since=GI('pit_s'),boost=GN('pit_b'),n=GI('pit_n');
  const pity=Math.max(0,since-50)*0.001;const cur=Math.min(0.98,(base+pity)*boost);
  const en=1-Math.pow(1-cur,n);
  let leg=0,rare=0;
  for(let i=0;i<n;i++){const r=Math.random();if(r<cur)leg++;else if(r<cur+0.15)rare++;}
  ST('pit_rate',(cur*100).toFixed(1)+'%');ST('pit_base',(base*100).toFixed(1)+'%');
  ST('pit_pity',pity>0?'+'+(pity*100).toFixed(1)+'%':'None (need 50+ dry pulls)');
  ST('pit_e',(en*100).toFixed(1)+'% chance of 1+');
  ST('pit_sim',leg+' Legendary, '+rare+' Rare from '+n+' pulls');SH('pity_out');
}
function comboCalc(){
  const b=GN('dc_b'),t=GN('dc_t'),l=GN('dc_l'),s=GN('dc_s'),bl=GN('dc_bl'),base=GI('dc_base');
  const mult=b*t*l*s*bl;const tot=Math.floor(base*mult);
  ST('dc_tot',tot.toLocaleString()+' dmg');
  ST('dc_mult','×'+mult.toFixed(2));ST('dc_base2',base.toLocaleString());
  ST('dc_bonus',(tot-base).toLocaleString()+' bonus');SH('combo_out');
}
function fieldCalc(){
  const req={Botany:['fs_bot',5],Crafting:['fs_cra',5],Cooking:['fs_coo',5],Clairvoyance:['fs_cla',4],'Water Mastery':['fs_wat',4],Lockpicking:['fs_loc',4],Leaping:['fs_lea',4],Ignition:['fs_ign',4]};
  let fail=[],html='';
  for(const [name,[id,r]] of Object.entries(req)){
    const v=GI(id),ok=v>=r;
    if(!ok)fail.push(name);
    html+=`<div class="ol"><span class="ok">${name}</span><span class="ov" style="color:${ok?'var(--a)':'#e85d3a'}">${v}/${r} ${ok?'✓':'need '+(r-v)+' more'}</span></div>`;
  }
  ST('fs_verdict',fail.length===0?'✓ Full coverage!':fail.length+' skill'+(fail.length>1?'s':'')+' need more');
  G('fs_verdict').style.color=fail.length===0?'var(--a)':'#e85d3a';
  ST('fs_sub',fail.length>0?'Missing: '+fail.join(', '):'Can pass every field skill check in the game!');
  G('fs_rows').innerHTML=html;SH('field_out');
}
function mercCalc(){
  const sh=GI('mc_short'),st=GI('mc_st'),lo=GI('mc_long'),lt=GI('mc_lt');
  const blades=GI('mc_blades'),lv=GI('mc_lv');
  const perMission=Math.max(1,Math.floor(blades/(sh+lo||1)));
  const tot=sh+lo;const dep=blades>=(sh+lo)*perMission;
  const trustBonus=Math.floor((sh*st+lo*lt)/30*lv*5);
  ST('mc_res',tot+' missions queued');
  ST('mc_tot',tot);ST('mc_dep',dep?'Yes — all deployed':'No — adjust mission count');
  ST('mc_trust','+'+trustBonus+' trust est.');SH('merc_out');
}
function pouchCalc(){
  const fav=GI('po_fav'),lik=GI('po_lik'),neu=GI('po_neu');
  const rank=GI('po_rank'),merc=GI('po_merc');
  const rankMult=1+(rank-1)*0.1;const mercMult=1+merc/100;
  const favT=Math.floor(fav*300*rankMult*mercMult);
  const likT=Math.floor(lik*150*rankMult*mercMult);
  const neuT=Math.floor(neu*80*rankMult*mercMult);
  const total=favT+likT+neuT;
  ST('po_total',total.toLocaleString()+' trust gained');
  ST('po_fav_v',favT.toLocaleString());ST('po_lik_v',likT.toLocaleString());ST('po_neu_v',neuT.toLocaleString());
  ST('po_tip',fav>0?'Favourite items give 2× liked item trust':'Add favourite category items for best return');SH('pouch_out');
}

// TTGC
function commCalc(){
  const c=GI('cm_c'),t=GI('cm_t'),e=GI('cm_e'),mem=GI('cm_m'),b=GI('cm_b'),q=GI('cm_q');
  if(t<=c){ST('cm_res','Already at target!');SH('comm_out');return;}
  const thresh=[0,200,600,1400,3000,5500,9000,14000,21000,30000];
  const need=thresh[t-1]-e;
  const me=mem*80,be=b*50,qe=q*60,have=me+be+qe,short=Math.max(0,need-have);
  ST('cm_res',short<=0?'Enough EXP!':short.toLocaleString()+' EXP needed');
  G('cm_res').style.color=short<=0?'var(--a)':'#e85d3a';
  ST('cm_sub','Lv '+c+' → Lv '+t+' · '+need.toLocaleString()+' total');
  ST('cm_me',me.toLocaleString());ST('cm_be',be.toLocaleString());ST('cm_qe',qe.toLocaleString());
  ST('cm_sh',short>0?short.toLocaleString():'None (surplus)');
  ST('cm_need',Math.ceil(short/80)>0?Math.ceil(short/80)+' more':'None needed');SH('comm_out');
}

function lsCalc(){

// XC3
function cpCalc(){
  const rank=GI('cp_r'),cur=GI('cp_c'),rate=GI('cp_rate'),coin=GN('cp_coin');
  const thresh=[800,2500,6000,12000,20000];
  const rankCost=thresh[rank],left=rankCost-cur;
  let total=left;for(let i=rank+1;i<5;i++)total+=thresh[i];
  const eff=Math.floor(rate*coin);
  ST('cp_bat',Math.ceil(left/eff).toLocaleString()+' battles to next rank');
  ST('cp_sub','Class rank '+(rank+1)+' → '+(rank+2));
  ST('cp_nxt',left.toLocaleString()+' CP');ST('cp_tot',total.toLocaleString()+' CP');
  ST('cp_eff',eff+' CP');ST('cp_tbm',Math.ceil(total/eff).toLocaleString()+' battles');SH('cp_out');
}
function chainCalc(){
  const a=GI('ca_a'),d=GI('ca_d'),h=GI('ca_h'),o=GN('ca_o'),tp=GI('ca_tp'),hp=GI('ca_hp');
  const roles=(a>0?1:0)+(d>0?1:0)+(h>0?1:0);
  const chars=a+d+h;
  const gauge=Math.min(100,Math.floor((chars*20+roles*15)*o));
  const mult=(1+gauge/100).toFixed(2);
  const btp=Math.min(100,Math.floor(tp+gauge*0.3));
  const ord=d>0&&a>0?'Healer → Defender → Attacker last':a>0?'Attacker last for max dmg':'Healer first, attacker last';
  ST('ca_mult','×'+mult+' damage');ST('ca_g',gauge+'%');ST('ca_ord',ord);
  ST('ca_ok',hp<=40?'Yes — favorable!':'Low — weaken first');ST('ca_btp',btp+'%');SH('ca_out');
}

function frChainCalc(){
  const hp=GI('frc_hp'),chp=GI('frc_chp'),p=GI('frc_p'),b=GI('frc_b'),l=GN('frc_l'),d=GI('frc_d');
  const curHp=Math.floor(hp*chp/100);const boostM=1+b*0.2;
  const tot=Math.floor(p*d*boostM*l);const ok=tot-curHp;
  const okPct=ok>0?Math.floor(ok/curHp*100):0;
  const tier=okPct>=200?'S (200%+)':okPct>=100?'A (100%+)':okPct>=50?'B (50%+)':ok>0?'C (some)':'No overkill';
  ST('frc_v',ok>0?'Overkill!':'Not enough dmg',ok>0?'var(--a)':'#e85d3a');
  ST('frc_sub',p+' members · ×'+boostM.toFixed(1)+' boost · legacy ×'+l);
  ST('frc_cur',curHp.toLocaleString()+' HP');ST('frc_tot',tot.toLocaleString()+' dmg');
  ST('frc_ok',ok>0?ok.toLocaleString()+' ('+okPct+'%)':'None',ok>0?'var(--a)':'#e85d3a');
  ST('frc_tier',tier);SH('frc_out');
}

function deProbeCalc(){

function deDPSCalc(){
  const w1=GI('sd_w1'),w2=GI('sd_w2'),lv=GI('sd_lv'),aug=GI('sd_aug');
  const od=GN('sd_od'),odm=GN('sd_odm'),cd=GI('sd_cd'),arts=GI('sd_arts');
  const lvB=1+(lv-30)*0.02;const base=Math.floor((w1+w2*0.6)*(1+aug/100)*lvB);
  const cycleT=cd*arts;const normDPS=Math.floor(base*arts/cycleT);
  const odUp=Math.min(0.5,od*10/60);const odDPS=Math.floor(base*arts*odm/cycleT);
  const blended=Math.floor(normDPS*(1-odUp)+odDPS*odUp);
  ST('sd_dps',blended.toLocaleString()+' DPS');ST('sd_b',base.toLocaleString()+' per art');
  ST('sd_n',normDPS.toLocaleString()+' DPS');ST('sd_odd',odDPS.toLocaleString()+' DPS');
  ST('sd_upt',Math.round(odUp*100)+'% of fight');SH('dps_out');
}
function deBPCalc(){
  const cur=GI('de_brc'),tgt=GI('de_brt'),bp=GI('de_brb'),m=GI('de_brm'),div=GI('de_brd');
  if(tgt<=cur){ST('de_brv','Already there!');SH('de_bp_out');return;}

// RENDER ENGINE
// ═══════════════════════════════════════════════
let activeGame='xc1';

function buildTabs(){
  document.getElementById('tabs').innerHTML=GAMES.map(g=>
    `<button class="t${g.id===activeGame?' on':''}" onclick="switchGame('${g.id}')"><span class="tdot" style="background:${g.a};box-shadow:0 0 5px ${g.a}"></span>${g.s}</button>`
  ).join('');
}

function switchGame(id){
  activeGame=id;
  document.documentElement.style.setProperty('--a',GAMES.find(g=>g.id===id).a);
  buildTabs();renderMain();
}

function renderMain(){
  const game=GAMES.find(g=>g.id===activeGame);
  const tools=T[activeGame]||[];
  document.getElementById('main').innerHTML=`
    <div class="gi"><div class="gn">${game.n}</div><div class="gt">${game.t}</div></div>
    <div class="tg">${tools.map(tool=>`
      <div class="tc" id="tc_${tool.id}">
        <div class="th" onclick="toggleTool('${tool.id}')">
          <span class="ti">${tool.icon}</span>
          <div class="tm"><div class="tn">${tool.name}</div><div class="tb">${tool.brief}</div></div>
          <span class="tch">▼</span>
        </div>
        <div class="bd" id="bd_${tool.id}">${tool.html}</div>
      </div>`).join('')}
    </div>`;
}

function toggleTool(id){
  document.getElementById('tc_'+id).classList.toggle('open');
}

buildTabs();renderMain();
</script>
